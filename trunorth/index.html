<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="TruNorth helps kids practice empathy, courage, and calm through interactive stories — and gives parents counselor-style coaching insights to support growth at home." />
    <meta name="theme-color" content="#1a1a2e" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <!--
      Fonts are SELF-HOSTED (public/fonts), not fetched from Google Fonts.
      Spec §13A.1/§13A.3: demo mode must make no external asset fetches and the
      showcase must run with no internet at all. A CDN <link> here silently fell
      back to system fonts on an offline stage. Guarded by tests/e2e/demo-mode.spec.ts.
    -->
    <link rel="preload" href="/fonts/nunito-latin-var.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/inter-latin-var.woff2" as="font" type="font/woff2" crossorigin />
    <title>TruNorth</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
