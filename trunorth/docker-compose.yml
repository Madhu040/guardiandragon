services:
  api:
    build: .
    ports:
      - "${PORT:-3001}:3001"
    environment:
      PORT: ${PORT:-3001}
      HOST: 0.0.0.0
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      DATABASE_PATH: ${DATABASE_PATH:-/app/data/trunorth.db}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      COMPANION_MODEL: ${COMPANION_MODEL:-claude-3-5-haiku-latest}
      CONFIDENCE_FLOOR: ${CONFIDENCE_FLOOR:-0.55}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://localhost:5173,http://localhost:4173}
    volumes:
      - trunorth_data:/app/data

  web:
    image: nginx:alpine
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
    depends_on:
      - api

volumes:
  trunorth_data:
